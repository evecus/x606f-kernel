name: Build Kernel

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev libelf-dev \
            make git python3 libncurses-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang lld llvm

      - name: Build kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CC=clang
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export KCFLAGS="-fno-integrated-as"

          mkdir -p out

          # 1. 生成配置
          make -j$(nproc) \
            O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            achilles6_row_wifi_defconfig

          # 2. 编译内核
          make -j$(nproc) \
            O=out \
            ARCH=arm64 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Check output
        run: |
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "✅ Build successful!"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "✅ Build successful! (Image.gz)"
            ls -lh out/arch/arm64/boot/Image.gz
          else
            echo "❌ Kernel image not found, listing boot dir:"
            ls -lh out/arch/arm64/boot/ || true
            exit 1
          fi

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.sha }}
          path: |
            out/arch/arm64/boot/Image.gz-dtb
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image
          if-no-files-found: error
