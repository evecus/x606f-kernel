name: Build Kernel

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libssl-dev libelf-dev \
            make git libncurses-dev \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang lld llvm \
            python2

          # 创建 python -> python2 软链接
          sudo ln -sf /usr/bin/python2 /usr/local/bin/python

      - name: Fix script permissions
        run: |
          # 处理有扩展名的脚本
          find scripts/ -name "*.sh" | xargs chmod +x 2>/dev/null || true
          find scripts/ -name "*.pl" | xargs chmod +x 2>/dev/null || true
          find scripts/ -name "*.py" | xargs chmod +x 2>/dev/null || true
          find tools/   -name "*.sh" | xargs chmod +x 2>/dev/null || true
          find tools/   -name "*.py" | xargs chmod +x 2>/dev/null || true

          # 处理 scripts/ 下所有无扩展名的可执行文件（如 dtc_overlay）
          find scripts/ -type f ! -name "*.*" | xargs chmod +x 2>/dev/null || true

          # 单独确保关键文件有权限
          chmod +x scripts/dtc/dtc_overlay 2>/dev/null || true
          chmod +x scripts/ld-version.sh   2>/dev/null || true
          chmod +x tools/dct/DrvGen.py     2>/dev/null || true

      - name: Fix DrvGen.py python2 shebang
        run: |
          find tools/dct/ -name "*.py" | while read f; do
            if head -1 "$f" | grep -q "^#!"; then
              sed -i '1s|^#!.*|#!/usr/bin/env python2|' "$f"
            else
              sed -i '1s|^|#!/usr/bin/env python2\n|' "$f"
            fi
          done
          echo "Shebang check:"
          head -1 tools/dct/DrvGen.py

      - name: Fix dtc yylloc multiple definition (gcc 10+ compatibility)
        run: |
          DTC_LEXER="scripts/dtc/dtc-lexer.lex.c_shipped"
          if [ -f "$DTC_LEXER" ]; then
            sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/' "$DTC_LEXER"
            echo "Fixed: $DTC_LEXER"
            grep "yylloc" "$DTC_LEXER"
          fi

      - name: Build kernel
        run: |
          mkdir -p out

          COMMON_ARGS="O=${GITHUB_WORKSPACE}/out
            ARCH=arm64
            CROSS_COMPILE=aarch64-linux-gnu-
            CLANG_TRIPLE=aarch64-linux-gnu-
            CC=clang
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip"

          # 1. 生成配置
          make -j$(nproc) $COMMON_ARGS achilles6_row_wifi_defconfig

          # 2. 编译内核
          make -j$(nproc) $COMMON_ARGS

      - name: Check output
        run: |
          if [ -f "out/arch/arm64/boot/Image.gz-dtb" ]; then
            echo "✅ Build successful! Image.gz-dtb"
            ls -lh out/arch/arm64/boot/Image.gz-dtb
          elif [ -f "out/arch/arm64/boot/Image.gz" ]; then
            echo "✅ Build successful! Image.gz"
            ls -lh out/arch/arm64/boot/Image.gz
          else
            echo "❌ Kernel image not found, listing boot dir:"
            ls -lh out/arch/arm64/boot/ || true
            exit 1
          fi

      - name: Upload kernel image
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ github.sha }}
          path: |
            out/arch/arm64/boot/Image.gz-dtb
            out/arch/arm64/boot/Image.gz
            out/arch/arm64/boot/Image
          if-no-files-found: error
